name: ghcr-image

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      image_tag:
        description: Required image tag for manual GHCR publishes
        required: true
        type: string

env:
  IMAGE_REPO_NAME: stronk-cliproxyapi

permissions:
  contents: read
  packages: write

jobs:
  docker_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Resolve GHCR metadata
        id: meta
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.image_tag }}"
            if [[ "${version}" == "latest" ]]; then
              echo "Manual dispatch may not publish the mutable latest tag" >&2
              exit 1
            fi
            tags="ghcr.io/${owner}/${IMAGE_REPO_NAME}:${version}"
          else
            version="${GITHUB_REF_NAME}"
            tags="$(printf '%s\n%s' \
              "ghcr.io/${owner}/${IMAGE_REPO_NAME}:${version}" \
              "ghcr.io/${owner}/${IMAGE_REPO_NAME}:latest")"
          fi
          echo "image=ghcr.io/${owner}/${IMAGE_REPO_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Build Metadata
        run: |
          echo "VERSION=${{ steps.meta.outputs.version }}" >> $GITHUB_ENV
          echo COMMIT=`git rev-parse --short HEAD` >> $GITHUB_ENV
          echo BUILD_DATE=`date -u +%Y-%m-%dT%H:%M:%SZ` >> $GITHUB_ENV
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: ${{ steps.meta.outputs.tags }}
